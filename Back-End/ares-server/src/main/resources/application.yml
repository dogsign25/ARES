spring:
    datasource:
      url: jdbc:mysql://localhost:3306/ares_db?serverTimezone=Asia/Seoul
      username: root          # 본인의 MySQL ID
      password: 1234     # 본인의 MySQL PW
      driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
      hibernate:
        ddl-auto: update      # 엔티티 기반으로 테이블 자동 생성/수정
      show-sql: true          # 실행되는 쿼리 로그 확인
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.MySQL8Dialect

mqtt:
  broker-url: ${ARES_MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${ARES_MQTT_CLIENT_ID:hexapod-spring-server}
  username:
  password:
  topics:
    sensor: hexapod/+/sensors
    alert:  hexapod/+/alert
    status: hexapod/+/status

mock:
  enabled: false
  robot-id: robot-01
  robot-name: "Ares-1"
  interval-ms: 1000
  survivor-rate: 0.05

logging:
  level:
    com.ares: INFO

jwt:
  secret: hexapod-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration-ms: 86400000   # 24시간

server:
  port: 8086
